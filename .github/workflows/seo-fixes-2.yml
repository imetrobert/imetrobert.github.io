name: SEO Fixes Round 2 (Run Once)

on:
  workflow_dispatch:

jobs:
  seo-fixes-2:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install beautifulsoup4 lxml

      - name: Run SEO fixes
        run: python seo-fixes-2.py

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "SEO Fixes Bot"

      - name: Commit and push
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "No changes — everything already up to date."
          else
            git commit -m "SEO fixes: internal links, metrics formatting, index description"
            git push
            echo "Changes pushed."
          fi

      - name: Summary
        run: |
          echo "## SEO Fixes Round 2 Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Fix | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| blog/index.html description (AI Evangelist removed) | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Internal links added to all posts | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Adoption metrics formatting fixed | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Reminder:** Upload og-blog.jpg to blog/ folder if not already done." >> $GITHUB_STEP_SUMMARY
