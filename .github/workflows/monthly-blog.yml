name: Generate Monthly AI Blog Post - Last Day of Month

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Custom blog topic (optional)'
        required: false
        type: string
      output:
        description: 'Output directory (staging = preview first, posts = publish directly)'
        required: false
        default: 'staging'
        type: choice
        options:
        - staging
        - posts
      force_run:
        description: 'Force run regardless of date (for testing)'
        required: false
        default: false
        type: boolean
      coverage_month:
        description: 'Override which month this run is ABOUT, e.g. "June 2026". Use this to fully re-run a past month''s report (not just tweak an existing staging draft — for that, use the Regenerate button on the preview page instead). Leave blank for a normal run.'
        required: false
        type: string

# Shared across monthly-blog / regenerate-blog / approve-blog: all three read
# and rewrite files under blog/ and push to main. Without a shared group,
# two runs firing close together (e.g. a manual trigger overlapping the daily
# cron check, or an impatient double-click in the preview UI) can race on the
# same git push and corrupt staging state. Queue instead of racing.
permissions:
  contents: write

concurrency:
  group: blog-pipeline
  cancel-in-progress: false

jobs:
  check-last-day:
    runs-on: ubuntu-latest
    outputs:
      is_last_day: ${{ steps.check.outputs.is_last_day }}
      current_date: ${{ steps.check.outputs.current_date }}
      month_year: ${{ steps.check.outputs.month_year }}

    steps:
      - name: Check if today is last day of month
        id: check
        run: |
          CURRENT_DAY=$(date +%-d)
          CURRENT_MONTH=$(date +%-m)
          CURRENT_YEAR=$(date +%Y)
          MONTH_YEAR=$(date +"%B %Y")
          if [ -n "${{ github.event.inputs.coverage_month }}" ]; then
            MONTH_YEAR="${{ github.event.inputs.coverage_month }}"
            echo "coverage_month override provided — using: $MONTH_YEAR"
          fi
          CURRENT_DATE=$(date +"%Y-%m-%d")
          NEXT_MONTH=$((CURRENT_MONTH + 1))
          NEXT_YEAR=$CURRENT_YEAR
          if [ $NEXT_MONTH -gt 12 ]; then
            NEXT_MONTH=1
            NEXT_YEAR=$((CURRENT_YEAR + 1))
          fi
          LAST_DAY=$(date -d "${NEXT_YEAR}-$(printf "%02d" $NEXT_MONTH)-01 -1 day" +%-d)
          echo "Current day: $CURRENT_DAY / Last day: $LAST_DAY"
          if [ "$CURRENT_DAY" = "$LAST_DAY" ] || [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            echo "is_last_day=true" >> $GITHUB_OUTPUT
          else
            echo "is_last_day=false" >> $GITHUB_OUTPUT
          fi
          echo "current_date=$CURRENT_DATE" >> $GITHUB_OUTPUT
          echo "month_year=$MONTH_YEAR" >> $GITHUB_OUTPUT

  generate-blog:
    runs-on: ubuntu-latest
    needs: check-last-day
    if: needs.check-last-day.outputs.is_last_day == 'true'
    outputs:
      staging_filename: ${{ steps.generate.outputs.staging_filename }}
      preview_url: ${{ steps.generate.outputs.preview_url }}
      output_dir: ${{ steps.generate.outputs.output_dir }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r scripts/requirements.txt
          pip3 install beautifulsoup4 lxml

      - name: Verify Gemini API key
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 scripts/verify_gemini_key.py

      - name: Generate blog post
        id: generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}/scripts
        run: |
          OUTPUT_DIR="${{ github.event.inputs.output || 'staging' }}"
          TOPIC="${{ github.event.inputs.topic }}"

          echo "Output directory: $OUTPUT_DIR"

          if [ -n "$TOPIC" ]; then
            python3 scripts/generate-blog.py --topic "$TOPIC" --output "$OUTPUT_DIR" --coverage-month "${{ needs.check-last-day.outputs.month_year }}"
          else
            python3 scripts/generate-blog.py --output "$OUTPUT_DIR" --coverage-month "${{ needs.check-last-day.outputs.month_year }}"
          fi

          # Find the generated file in the correct output directory
          GENERATED_FILE=$(find "blog/$OUTPUT_DIR/" -name "*.html" -newer scripts/generate-blog.py 2>/dev/null | grep -v preview | head -1)
          if [ -z "$GENERATED_FILE" ]; then
            GENERATED_FILE=$(ls -t "blog/$OUTPUT_DIR/"*.html 2>/dev/null | grep -v preview | head -1)
          fi

          if [ -z "$GENERATED_FILE" ]; then
            echo "ERROR: No generated file found in blog/$OUTPUT_DIR/"
            exit 1
          fi

          FILENAME=$(basename "$GENERATED_FILE")
          echo "staging_filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "output_dir=$OUTPUT_DIR" >> $GITHUB_OUTPUT
          echo "preview_url=https://www.imetrobert.com/blog/staging/preview.html?v=${{ github.run_id }}" >> $GITHUB_OUTPUT
          echo "Generated: $FILENAME in $OUTPUT_DIR"

      - name: Generate preview approval page
        if: ${{ github.event.inputs.output != 'posts' }}
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
        run: |
          python3 scripts/generate-preview-page.py \
            --filename "${{ steps.generate.outputs.staging_filename }}" \
            --month "${{ needs.check-last-day.outputs.month_year }}" \
            --run-id "${{ github.run_id }}"

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Blog Generator"

      - name: Commit generated files
        run: |
          git add blog/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            OUTPUT_DIR="${{ github.event.inputs.output || 'staging' }}"
            if [ "$OUTPUT_DIR" = "posts" ]; then
              git commit -m "Publish: ${{ needs.check-last-day.outputs.month_year }} — published directly"
            else
              git commit -m "Staging: ${{ needs.check-last-day.outputs.month_year }} post ready for review"
            fi
            git push
            echo "Committed and pushed"
          fi

      - name: Regenerate sitemap (if published directly to posts)
        if: ${{ github.event.inputs.output == 'posts' }}
        run: python3 scripts/regenerate_sitemap.py

      # Runs only if an earlier step in this job failed (Gemini quota, a bad
      # or rotated GEMINI_API_KEY, a transient network error, etc). Without
      # this, a failed generation leaves blog/staging/preview.html exactly
      # as it was after last month's approval — usually deleted — so the
      # monthly manual check-in would just find a blank 404 with no
      # indication anything is wrong. Every earlier step that touches git
      # is skipped on failure (no if: always()), so this one configures git
      # itself rather than relying on the already-skipped "Configure Git"
      # step above.
      - name: Note generation failure in the preview page
        if: ${{ failure() && github.event.inputs.output != 'posts' }}
        run: |
          mkdir -p blog/staging
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          FAIL_DATE="$(date -u +%Y-%m-%d)"
          cat > blog/staging/preview.html <<HTML
          <!DOCTYPE html>
          <html lang="en"><head><meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Blog generation failed — Robert Simon</title>
          <meta name="robots" content="noindex, nofollow">
          <style>
            body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 640px; margin: 4rem auto; padding: 0 1.5rem; line-height: 1.7; color: #1e293b; }
            h1 { color: #dc2626; font-size: 1.5rem; }
            code { background: #f1f5f9; padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.9em; }
            a { color: #2563eb; }
            .steps { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 1.25rem 1.5rem; }
          </style></head>
          <body>
          <h1>⚠️ This month's blog generation failed</h1>
          <p>The scheduled <code>monthly-blog.yml</code> run on <strong>$FAIL_DATE</strong> did not complete — no draft was generated this time.</p>
          <p><a href="$RUN_URL" target="_blank">View the failed run and logs on GitHub →</a></p>
          <div class="steps">
            <p><strong>Likely causes:</strong> Gemini API daily quota exhausted, an invalid or rotated <code>GEMINI_API_KEY</code> secret, or a transient network error.</p>
            <p><strong>To retry:</strong> go to <strong>Actions → Generate Monthly AI Blog Post → Run workflow</strong>, check <strong>Force run</strong>, and run it again. This page will be replaced automatically once generation succeeds.</p>
          </div>
          </body></html>
          HTML
          git config --local user.email "action@github.com"
          git config --local user.name "Blog Generator"
          git add blog/staging/preview.html
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "Note: monthly generation failed on $FAIL_DATE — see run ${{ github.run_id }}"
            git push
            echo "Committed failure notice"
          fi

      - name: Failure summary
        if: ${{ failure() }}
        run: |
          echo "## ❌ Blog Generation Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the failed step above for the actual error." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To retry: **Actions → Generate Monthly AI Blog Post → Run workflow**, check **Force run**." >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event.inputs.output }}" != "posts" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "A failure notice has been pushed to \`blog/staging/preview.html\` so the monthly check-in shows something meaningful instead of a blank page." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Summary
        run: |
          OUTPUT_DIR="${{ github.event.inputs.output || 'staging' }}"
          echo "## Blog Post Generated ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Detail |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Month | ${{ needs.check-last-day.outputs.month_year }} |" >> $GITHUB_STEP_SUMMARY
          echo "| File | ${{ steps.generate.outputs.staging_filename }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Output | $OUTPUT_DIR |" >> $GITHUB_STEP_SUMMARY
          if [ "$OUTPUT_DIR" = "staging" ]; then
            echo "| Preview | https://www.imetrobert.com/blog/staging/preview.html?v=${{ github.run_id }} |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> ⏱ Allow 30-60s for GitHub Pages to finish deploying before opening the link above — check the separate 'pages build and deployment' run in the Actions tab if it looks stale." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> Visit the preview URL above to review, regenerate, or approve the post." >> $GITHUB_STEP_SUMMARY
          else
            echo "| Live URL | https://www.imetrobert.com/blog/posts/${{ steps.generate.outputs.staging_filename }} |" >> $GITHUB_STEP_SUMMARY
          fi

  skipped:
    runs-on: ubuntu-latest
    needs: check-last-day
    if: needs.check-last-day.outputs.is_last_day == 'false'
    steps:
      - name: Skip summary
        run: |
          echo "## Blog Generation Skipped" >> $GITHUB_STEP_SUMMARY
          echo "Not the last day of ${{ needs.check-last-day.outputs.month_year }}." >> $GITHUB_STEP_SUMMARY
          echo "Use **Force run = true** to generate immediately." >> $GITHUB_STEP_SUMMARY
