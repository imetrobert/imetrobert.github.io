name: Generate Monthly AI Blog Post - Last Day of Month

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Custom blog topic (optional)'
        required: false
        type: string
      force_run:
        description: 'Force run regardless of date (for testing)'
        required: false
        default: false
        type: boolean

jobs:
  check-last-day:
    runs-on: ubuntu-latest
    outputs:
      is_last_day: ${{ steps.check.outputs.is_last_day }}
      current_date: ${{ steps.check.outputs.current_date }}
      month_year: ${{ steps.check.outputs.month_year }}

    steps:
      - name: Check if today is last day of month
        id: check
        run: |
          CURRENT_DAY=$(date +%-d)
          CURRENT_MONTH=$(date +%-m)
          CURRENT_YEAR=$(date +%Y)
          MONTH_YEAR=$(date +"%B %Y")
          CURRENT_DATE=$(date +"%Y-%m-%d")
          NEXT_MONTH=$((CURRENT_MONTH + 1))
          NEXT_YEAR=$CURRENT_YEAR
          if [ $NEXT_MONTH -gt 12 ]; then
            NEXT_MONTH=1
            NEXT_YEAR=$((CURRENT_YEAR + 1))
          fi
          LAST_DAY=$(date -d "${NEXT_YEAR}-$(printf "%02d" $NEXT_MONTH)-01 -1 day" +%-d)
          echo "Current day: $CURRENT_DAY / Last day: $LAST_DAY"
          if [ "$CURRENT_DAY" = "$LAST_DAY" ] || [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            echo "is_last_day=true" >> $GITHUB_OUTPUT
          else
            echo "is_last_day=false" >> $GITHUB_OUTPUT
          fi
          echo "current_date=$CURRENT_DATE" >> $GITHUB_OUTPUT
          echo "month_year=$MONTH_YEAR" >> $GITHUB_OUTPUT

  generate-blog:
    runs-on: ubuntu-latest
    needs: check-last-day
    if: needs.check-last-day.outputs.is_last_day == 'true'
    outputs:
      staging_filename: ${{ steps.generate.outputs.staging_filename }}
      preview_url: ${{ steps.generate.outputs.preview_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
          pip install beautifulsoup4 lxml

      - name: Verify Gemini API key
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 - << 'PYEOF'
          import os, requests, sys
          key = os.environ.get("GEMINI_API_KEY", "")
          if not key:
              print("ERROR: GEMINI_API_KEY is empty")
              sys.exit(1)
          url = f"https://generativelanguage.googleapis.com/v1beta/models?key={key}"
          r = requests.get(url, timeout=15)
          if r.status_code == 200:
              print("API key VALID")
          else:
              print(f"ERROR: {r.status_code}: {r.text[:200]}")
              sys.exit(1)
          PYEOF

      - name: Generate blog post to staging
        id: generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          TOPIC="${{ github.event.inputs.topic }}"
          if [ -n "$TOPIC" ]; then
            python scripts/generate-blog.py --topic "$TOPIC" --output staging
          else
            python scripts/generate-blog.py --output staging
          fi

          # Find the generated file
          STAGING_FILE=$(find blog/staging/ -name "*.html" -newer scripts/generate-blog.py 2>/dev/null | head -1)
          if [ -z "$STAGING_FILE" ]; then
            STAGING_FILE=$(ls -t blog/staging/*.html 2>/dev/null | grep -v preview | head -1)
          fi

          if [ -z "$STAGING_FILE" ]; then
            echo "ERROR: No staged file found"
            exit 1
          fi

          FILENAME=$(basename "$STAGING_FILE")
          echo "staging_filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "preview_url=https://www.imetrobert.com/blog/staging/preview.html" >> $GITHUB_OUTPUT
          echo "Generated: $FILENAME"

      - name: Generate preview approval page
        run: |
          python3 scripts/generate-preview-page.py \
            --filename "${{ steps.generate.outputs.staging_filename }}" \
            --month "${{ needs.check-last-day.outputs.month_year }}" \
            --run-id "${{ github.run_id }}"

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Blog Generator"

      - name: Commit staging files
        run: |
          git add blog/staging/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Staging: ${{ needs.check-last-day.outputs.month_year }} post ready for review"
            git push
            echo "Staging committed and pushed"
          fi

      - name: Send email notification
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          MONTH_YEAR: ${{ needs.check-last-day.outputs.month_year }}
          PREVIEW_URL: ${{ steps.generate.outputs.preview_url }}
          STAGING_FILENAME: ${{ steps.generate.outputs.staging_filename }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python3 scripts/send-notification.py

  skipped:
    runs-on: ubuntu-latest
    needs: check-last-day
    if: needs.check-last-day.outputs.is_last_day == 'false'
    steps:
      - name: Skip summary
        run: |
          echo "## Blog Generation Skipped" >> $GITHUB_STEP_SUMMARY
          echo "Not the last day of ${{ needs.check-last-day.outputs.month_year }}." >> $GITHUB_STEP_SUMMARY
          echo "Use Force run = true to generate immediately." >> $GITHUB_STEP_SUMMARY
