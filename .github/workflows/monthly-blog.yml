name: Generate Monthly AI Blog Post - Last Day of Month

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Custom blog topic (optional - will use default Canadian business focus)'
        required: false
        type: string
      output:
        description: 'Output directory'
        required: false
        default: 'posts'
        type: choice
        options:
        - posts
        - staging
      force_run:
        description: 'Force run regardless of date (for testing)'
        required: false
        default: false
        type: boolean

jobs:
  check-last-day:
    runs-on: ubuntu-latest
    outputs:
      is_last_day: ${{ steps.check.outputs.is_last_day }}
      current_date: ${{ steps.check.outputs.current_date }}
      month_year: ${{ steps.check.outputs.month_year }}

    steps:
      - name: Check if today is last day of month
        id: check
        run: |
          CURRENT_DAY=$(date +%-d)
          CURRENT_MONTH=$(date +%-m)
          CURRENT_YEAR=$(date +%Y)
          MONTH_YEAR=$(date +"%B %Y")
          CURRENT_DATE=$(date +"%Y-%m-%d")

          NEXT_MONTH=$((CURRENT_MONTH + 1))
          NEXT_YEAR=$CURRENT_YEAR
          if [ $NEXT_MONTH -gt 12 ]; then
            NEXT_MONTH=1
            NEXT_YEAR=$((CURRENT_YEAR + 1))
          fi

          LAST_DAY=$(date -d "${NEXT_YEAR}-$(printf "%02d" $NEXT_MONTH)-01 -1 day" +%-d)

          echo "Current day: $CURRENT_DAY / Last day: $LAST_DAY"

          if [ "$CURRENT_DAY" = "$LAST_DAY" ] || [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            echo "is_last_day=true" >> $GITHUB_OUTPUT
          else
            echo "is_last_day=false" >> $GITHUB_OUTPUT
          fi

          echo "current_date=$CURRENT_DATE" >> $GITHUB_OUTPUT
          echo "month_year=$MONTH_YEAR" >> $GITHUB_OUTPUT

  generate-blog:
    runs-on: ubuntu-latest
    needs: check-last-day
    if: needs.check-last-day.outputs.is_last_day == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Generate monthly AI insights blog post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Generating blog post for ${{ needs.check-last-day.outputs.month_year }}"
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            python scripts/generate-blog.py --topic "${{ github.event.inputs.topic }}" --output ${{ github.event.inputs.output || 'posts' }}
          else
            python scripts/generate-blog.py --output ${{ github.event.inputs.output || 'posts' }}
          fi

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "AI Blog Generator"

      - name: Check for changes
        id: git-check
        run: |
          git add .
          if git diff --staged --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git commit -m "Monthly AI Insights - ${{ needs.check-last-day.outputs.month_year }}

          Generated: ${{ needs.check-last-day.outputs.current_date }}
          Model: Gemini (free tier)
          Scope: Blog directory updates only"
          git push

      - name: Summary
        if: steps.git-check.outputs.changes == 'true'
        run: |
          echo "## Monthly AI Insights Posted!" >> $GITHUB_STEP_SUMMARY
          echo "**Generated:** ${{ needs.check-last-day.outputs.current_date }}" >> $GITHUB_STEP_SUMMARY
          echo "**Model:** Gemini free tier" >> $GITHUB_STEP_SUMMARY
          echo "**Remember:** Add your Robert's Take paragraph before next month!" >> $GITHUB_STEP_SUMMARY

  skipped-not-last-day:
    runs-on: ubuntu-latest
    needs: check-last-day
    if: needs.check-last-day.outputs.is_last_day == 'false'
    steps:
      - name: Skip summary
        run: |
          echo "## Blog Generation Skipped" >> $GITHUB_STEP_SUMMARY
          echo "Not the last day of ${{ needs.check-last-day.outputs.month_year }}." >> $GITHUB_STEP_SUMMARY
          echo "Use Force run = true to generate immediately." >> $GITHUB_STEP_SUMMARY

  notify-on-failure:
    runs-on: ubuntu-latest
    needs: [check-last-day, generate-blog]
    if: failure() && needs.check-last-day.outputs.is_last_day == 'true'
    steps:
      - name: Failure summary
        run: |
          echo "## Blog Generation Failed" >> $GITHUB_STEP_SUMMARY
          echo "Check that GEMINI_API_KEY secret is set correctly." >> $GITHUB_STEP_SUMMARY
          echo "Get a free key at https://aistudio.google.com/app/apikey" >> $GITHUB_STEP_SUMMARY
