name: Regenerate Blog Post with Custom Prompt

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Custom refinement prompt for Gemini'
        required: true
        type: string
      staging_filename:
        description: 'Existing staging filename to replace'
        required: false
        type: string
      month_year:
        description: 'DEPRECATED — use coverage_month instead. Kept only so older triggers do not error.'
        required: false
        type: string
      coverage_month:
        description: 'Month this regeneration is ABOUT, e.g. "June 2026". Keep this the SAME across every regenerate click for a given issue, even if you click it days later — otherwise Gemini will drift to searching a newer month. Defaults to the current month if omitted (only correct for a brand-new post).'
        required: false
        type: string

# Shared with monthly-blog.yml / approve-blog.yml — see comment there.
concurrency:
  group: blog-pipeline
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r scripts/requirements.txt
          pip3 install beautifulsoup4 lxml

      - name: Back up old staging file (safe swap — no data loss on failure)
        run: |
          if [ -n "${{ github.event.inputs.staging_filename }}" ]; then
            OLD_FILE="blog/staging/${{ github.event.inputs.staging_filename }}"
            BACKUP_FILE="${OLD_FILE}.bak"
            if [ -f "$OLD_FILE" ]; then
              cp "$OLD_FILE" "$BACKUP_FILE"
              echo "Backed up: $OLD_FILE → $BACKUP_FILE"
            else
              echo "No existing staging file to back up."
            fi
          fi

      - name: Resolve coverage month
        id: coverage
        run: |
          COVERAGE_MONTH="${{ github.event.inputs.coverage_month }}"
          if [ -z "$COVERAGE_MONTH" ]; then
            COVERAGE_MONTH="${{ github.event.inputs.month_year }}"
          fi
          if [ -z "$COVERAGE_MONTH" ]; then
            COVERAGE_MONTH=$(date +"%B %Y")
            echo "No coverage_month provided — defaulting to current month: $COVERAGE_MONTH"
          fi
          echo "coverage_month=$COVERAGE_MONTH" >> $GITHUB_OUTPUT
          echo "Regenerating for coverage month: $COVERAGE_MONTH"

      - name: Regenerate blog post with custom prompt
        id: generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd scripts
          python3 generate-blog.py \
            --topic "${{ github.event.inputs.prompt }}" \
            --output staging \
            --coverage-month "${{ steps.coverage.outputs.coverage_month }}"
          cd ..

      - name: Verify new staging file was created
        id: verify
        run: |
          NEW_FILE=$(ls -t blog/staging/*.html 2>/dev/null | grep -v preview | grep -v '\.bak' | head -1)
          if [ -z "$NEW_FILE" ]; then
            echo "ERROR: No new staging file was generated."
            if [ -n "${{ github.event.inputs.staging_filename }}" ]; then
              BACKUP="blog/staging/${{ github.event.inputs.staging_filename }}.bak"
              ORIGINAL="blog/staging/${{ github.event.inputs.staging_filename }}"
              if [ -f "$BACKUP" ]; then
                mv "$BACKUP" "$ORIGINAL"
                echo "Rolled back to backup: $ORIGINAL"
              fi
            fi
            exit 1
          fi
          FILENAME=$(basename "$NEW_FILE")
          echo "staging_filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "New staging file verified: $FILENAME"

      - name: Remove old staging file and backup now that generation succeeded
        run: |
          if [ -n "${{ github.event.inputs.staging_filename }}" ]; then
            OLD_FILE="blog/staging/${{ github.event.inputs.staging_filename }}"
            BACKUP_FILE="${OLD_FILE}.bak"
            NEW_FILENAME="${{ steps.verify.outputs.staging_filename }}"
            if [ "${{ github.event.inputs.staging_filename }}" != "$NEW_FILENAME" ]; then
              rm -f "$OLD_FILE"
              echo "Removed old staging file: $OLD_FILE"
            fi
            rm -f "$BACKUP_FILE"
            echo "Removed backup: $BACKUP_FILE"
          fi

      - name: Regenerate preview page
        run: |
          cd scripts
          python3 generate-preview-page.py \
            --filename "${{ steps.verify.outputs.staging_filename }}" \
            --month "${{ steps.coverage.outputs.coverage_month }}" \
            --run-id "${{ github.run_id }}" \
            --regenerated
          cd ..

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Blog Regenerator"

      - name: Commit regenerated staging files
        run: |
          git add blog/staging/
          git rm --cached blog/staging/*.bak 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Staging: Regenerated with custom prompt — $(date +%Y-%m-%d)"
            git push
            echo "Pushed regenerated post"
          fi

      - name: Summary
        run: |
          echo "## 🔄 Blog Post Regenerated!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Coverage month:** ${{ steps.coverage.outputs.coverage_month }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Prompt used:** ${{ github.event.inputs.prompt }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**New file:** ${{ steps.verify.outputs.staging_filename }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Preview:** https://www.imetrobert.com/blog/staging/preview.html?v=${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ⏱ Allow 2-3 minutes for GitHub Pages to rebuild before refreshing preview." >> $GITHUB_STEP_SUMMARY
