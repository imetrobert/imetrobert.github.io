name: Approve & Publish Blog Post

on:
  workflow_dispatch:
    inputs:
      staging_filename:
        description: 'Staging filename to promote (e.g. 2026-05-31-ai-insights-for-may-2026.html)'
        required: true
        type: string
      month_year:
        description: 'Month and year label (e.g. May 2026)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
          pip install beautifulsoup4 lxml

      - name: Validate staging file exists
        run: |
          STAGING_PATH="blog/staging/${{ github.event.inputs.staging_filename }}"
          if [ ! -f "$STAGING_PATH" ]; then
            echo "ERROR: Staging file not found: $STAGING_PATH"
            echo "Available staging files:"
            ls blog/staging/ 2>/dev/null || echo "  (staging directory empty)"
            exit 1
          fi
          echo "Found staging file: $STAGING_PATH"

      - name: Promote staging file to production
        run: |
          STAGING_PATH="blog/staging/${{ github.event.inputs.staging_filename }}"
          PROD_PATH="blog/posts/${{ github.event.inputs.staging_filename }}"

          # Copy to production posts folder
          cp "$STAGING_PATH" "$PROD_PATH"
          echo "Copied to production: $PROD_PATH"

          # Update latest.html
          cp "$STAGING_PATH" "blog/posts/latest.html"
          echo "Updated latest.html"

          # Clean up staging
          rm -f "$STAGING_PATH"
          rm -f "blog/staging/preview.html"
          echo "Cleaned staging folder"

      - name: Regenerate sitemap.xml
        run: |
          python3 - << 'PYEOF'
          import os, re
          from datetime import datetime

          POSTS_DIR = "blog/posts"
          BASE_URL  = "https://www.imetrobert.com"

          EXCLUDE = {
            "latest.html", "index.html",
            "2026-03-26-march-1-2026-openai-announces-gpt5-boasting-enhanced-reasoning-and-multimodal-capabilities.html",
            "2026-03-27-ai-insights-for-march-2026.html",
            "2025-10-01-key-ai-developments-this-month.html",
          }

          def iso_date(filename):
              m = re.match(r"(\d{4}-\d{2}-\d{2})", filename)
              return (m.group(1) + "T00:00:00+00:00") if m else datetime.now().strftime("%Y-%m-%dT00:00:00+00:00")

          posts = sorted(
              [f for f in os.listdir(POSTS_DIR)
               if f.endswith(".html") and f not in EXCLUDE
               and not f.startswith("{") and "{" not in f],
              reverse=True
          )

          today = datetime.now().strftime("%Y-%m-%dT00:00:00+00:00")

          entries = [
              (f"{BASE_URL}/",      today, "1.00"),
              (f"{BASE_URL}/blog/", today, "0.80"),
          ]
          for i, fname in enumerate(posts):
              priority = "0.90" if i == 0 else ("0.75" if i == 1 else "0.65")
              entries.append((f"{BASE_URL}/blog/posts/{fname}", iso_date(fname), priority))

          lines = [
              '<?xml version="1.0" encoding="UTF-8"?>',
              '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9"',
              '        xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"',
              '        xsi:schemaLocation="http://www.sitemaps.org/schemas/sitemap/0.9',
              '              http://www.sitemaps.org/schemas/sitemap/0.9/sitemap.xsd">',
              "",
          ]
          for loc, lastmod, priority in entries:
              lines += ["<url>", f"  <loc>{loc}</loc>",
                        f"  <lastmod>{lastmod}</lastmod>",
                        f"  <priority>{priority}</priority>", "</url>"]
          lines.append("</urlset>")

          with open("sitemap.xml", "w", encoding="utf-8") as f:
              f.write("\n".join(lines))

          print(f"sitemap.xml regenerated with {len(entries)} URLs")
          for loc, _, priority in entries:
              print(f"  [{priority}] {loc}")
          PYEOF

      - name: Update blog index
        run: |
          python3 - << 'PYEOF'
          import sys
          sys.path.insert(0, 'scripts')
          from generate_blog import update_blog_index
          posts = update_blog_index()
          print(f"Blog index updated with {len(posts)} posts")
          PYEOF

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Blog Publisher"

      - name: Commit and push production files
        run: |
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Publish: AI Insights — ${{ github.event.inputs.month_year }}

  Approved and published via review workflow.
  Sitemap regenerated."
            git push
            echo "Published successfully"
          fi

      - name: Ping Google to recrawl sitemap
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://www.google.com/ping?sitemap=https://www.imetrobert.com/sitemap.xml")
          echo "Google ping response: HTTP $RESPONSE"

      - name: Summary
        run: |
          echo "## ✅ Blog Post Published!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Detail |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Month | ${{ github.event.inputs.month_year }} |" >> $GITHUB_STEP_SUMMARY
          echo "| File | ${{ github.event.inputs.staging_filename }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Live URL | https://www.imetrobert.com/blog/posts/${{ github.event.inputs.staging_filename }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Latest | https://www.imetrobert.com/blog/posts/latest.html |" >> $GITHUB_STEP_SUMMARY
          echo "| Sitemap | Regenerated ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Google Pinged | ✅ |" >> $GITHUB_STEP_SUMMARY
