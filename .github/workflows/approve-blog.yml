name: Approve & Publish Blog Post

on:
  workflow_dispatch:
    inputs:
      staging_filename:
        description: 'Staging filename to promote (e.g. 2026-05-31-ai-insights-for-may-2026.html)'
        required: true
        type: string
      month_year:
        description: 'Month and year label (e.g. May 2026)'
        required: true
        type: string

# Shared with monthly-blog.yml / regenerate-blog.yml — see comment there.
permissions:
  contents: write

concurrency:
  group: blog-pipeline
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
          pip install beautifulsoup4 lxml

      - name: Validate staging file exists
        run: |
          STAGING_PATH="blog/staging/${{ github.event.inputs.staging_filename }}"
          if [ ! -f "$STAGING_PATH" ]; then
            echo "ERROR: Staging file not found: $STAGING_PATH"
            echo "Available staging files:"
            ls blog/staging/ 2>/dev/null || echo "  (staging directory empty)"
            exit 1
          fi
          echo "Found staging file: $STAGING_PATH"

      - name: Promote staging file to production
        run: |
          STAGING_PATH="blog/staging/${{ github.event.inputs.staging_filename }}"
          PROD_PATH="blog/posts/${{ github.event.inputs.staging_filename }}"

          cp "$STAGING_PATH" "$PROD_PATH"
          echo "Copied to production: $PROD_PATH"

          cp "$STAGING_PATH" "blog/posts/latest.html"
          echo "Updated latest.html"

          # Staging drafts are generated with noindex,nofollow so an
          # unapproved draft can never get crawled and indexed at its
          # staging URL (see scripts/renderer.py is_draft). This is a
          # verbatim byte copy though, so without this swap that noindex
          # tag would silently ship on the LIVE, published post too.
          for f in "$PROD_PATH" "blog/posts/latest.html"; do
            sed -i 's|<meta name="robots" content="noindex, nofollow">|<meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">|' "$f"
          done
          if grep -q 'name="robots" content="noindex' "$PROD_PATH"; then
            echo "ERROR: published post still contains noindex after promotion — aborting before commit."
            exit 1
          fi
          echo "Confirmed published post is indexable (robots tag flipped from staging default)"

          rm -f "$STAGING_PATH"
          echo "Cleaned staging folder"

      # Previously just deleted preview.html here, so revisiting that URL
      # between this approval and next month's generation showed a bare
      # 404. generate-preview-page.py unconditionally overwrites this file
      # the next time a draft is generated, so it's self-clearing. Shared
      # with discard-blog.yml — same "nothing pending" state either way.
      - name: Replace preview page with a "nothing pending" placeholder
        run: python3 scripts/write_nothing_pending_placeholder.py

      - name: Regenerate sitemap.xml
        run: python3 scripts/regenerate_sitemap.py

      - name: Update blog index
        run: |
          python3 -c "
          import sys, os
          sys.path.insert(0, os.path.join(os.getcwd(), 'scripts'))
          from blog_index import update_blog_index
          posts = update_blog_index()
          print(f'Blog index updated with {len(posts)} posts')
          "

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Blog Publisher"

      - name: Commit and push production files
        run: |
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Publish: AI Insights — ${{ github.event.inputs.month_year }} | Approved via review workflow | Sitemap regenerated"
            git push
            echo "Published successfully"
          fi

      - name: Ping Google to recrawl sitemap
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://www.google.com/ping?sitemap=https://www.imetrobert.com/sitemap.xml")
          echo "Google ping response: HTTP $RESPONSE"

      - name: Summary
        run: |
          echo "## ✅ Blog Post Published!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Detail |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Month | ${{ github.event.inputs.month_year }} |" >> $GITHUB_STEP_SUMMARY
          echo "| File | ${{ github.event.inputs.staging_filename }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Live URL | https://www.imetrobert.com/blog/posts/${{ github.event.inputs.staging_filename }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Latest | https://www.imetrobert.com/blog/posts/latest.html |" >> $GITHUB_STEP_SUMMARY
          echo "| Sitemap | Regenerated ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Google Pinged | ✅ |" >> $GITHUB_STEP_SUMMARY
