name: SEO Cleanup (Run Once)

on:
  workflow_dispatch:

jobs:
  seo-cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install beautifulsoup4 lxml

      - name: Run SEO cleanup
        run: python seo-cleanup.py

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "SEO Cleanup Bot"

      - name: Commit and push
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "No changes — everything already clean."
          else
            git commit -m "SEO cleanup: dedup schemas, standardize author, fix sitemap, add March redirects"
            git push
            echo "Changes pushed."
          fi

      - name: Summary
        run: |
          echo "## SEO Cleanup Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Task | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Deduplicated JSON-LD on all posts | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Standardized author title across all posts | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Removed Bell Canada worksFor from schemas | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Removed mismatched FAQ schemas | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Added meta redirect to March 26/27 duplicates | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Added meta redirect to Oct 1 stub | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Regenerated sitemap.xml (10 canonical URLs) | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Updated blog/index.html schema count | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Updated patch-existing-posts.py jobTitle | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next step:** Go to Google Search Console → Sitemaps → submit \`sitemap.xml\`" >> $GITHUB_STEP_SUMMARY
          echo "Then use URL Inspection to request indexing on your April 2026 post." >> $GITHUB_STEP_SUMMARY
